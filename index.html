<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delhi Beer Order Calculator</title>

<style>

:root{
--ink:#211b19;
--muted:#746965;
--line:#e7ded8;
--paper:#fffaf5;
--panel:#ffffff;
--brand:#b51622;
--brand-dark:#80111a;
--amber:#f2b84b;
--amber-soft:#fff0c2;
--green:#2f7d5c;
--shadow:0 18px 45px rgba(48,31,24,0.14);
}

*{
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:
linear-gradient(135deg,rgba(181,22,34,0.10),rgba(242,184,75,0.18)),
#f7efe7;
color:var(--ink);
margin:0;
padding:28px;
min-height:100vh;
}

.side-logo{
position:fixed;
top:50%;
z-index:0;
width:150px;
padding:16px;
border:1px solid rgba(231,222,216,0.85);
border-radius:8px;
background:rgba(255,255,255,0.84);
box-shadow:0 14px 35px rgba(48,31,24,0.12);
transform:translateY(-50%);
backdrop-filter:blur(10px);
}

.side-logo.left{
left:24px;
}

.side-logo.right{
right:24px;
}

.side-logo img{
display:block;
width:100%;
height:auto;
object-fit:contain;
}

.mobile-logo-strip{
display:none;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:14px;
}

.mobile-logo-strip img{
width:100%;
height:58px;
object-fit:contain;
padding:10px;
border:1px solid var(--line);
border-radius:8px;
background:white;
}

.container{
max-width:980px;
margin:auto;
position:relative;
z-index:1;
}

.hero{
background:
linear-gradient(135deg,rgba(33,27,25,0.92),rgba(128,17,26,0.88)),
url("https://images.unsplash.com/photo-1608270586620-248524c67de9?auto=format&fit=crop&w=1600&q=80");
background-size:cover;
background-position:center;
color:white;
padding:30px;
border-radius:8px 8px 0 0;
box-shadow:var(--shadow);
}

.eyebrow{
display:inline-block;
padding:6px 10px;
border:1px solid rgba(255,255,255,0.35);
border-radius:999px;
font-size:12px;
font-weight:bold;
letter-spacing:0;
text-transform:uppercase;
}

h1{
margin:16px 0 8px;
font-size:36px;
line-height:1.1;
}

.hero p{
max-width:620px;
margin:0;
color:rgba(255,255,255,0.82);
font-size:15px;
line-height:1.5;
}

.workspace{
display:grid;
grid-template-columns:minmax(0,1fr) 330px;
gap:18px;
align-items:start;
background:rgba(255,250,245,0.82);
border:1px solid rgba(231,222,216,0.75);
border-top:none;
padding:18px;
border-radius:0 0 8px 8px;
box-shadow:var(--shadow);
}

.order-panel,.summary-panel{
background:var(--panel);
border:1px solid var(--line);
border-radius:8px;
padding:20px;
}

.summary-panel{
position:sticky;
top:20px;
}

.section-title{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
margin-bottom:16px;
}

.section-title h2{
margin:0;
font-size:18px;
}

.badge{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:30px;
height:30px;
padding:0 9px;
border-radius:999px;
background:var(--amber-soft);
color:#7a4d08;
font-weight:bold;
font-size:13px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
font-size:13px;
color:#3b312d;
}

select,input{
width:100%;
padding:13px 12px;
margin-top:7px;
border:1px solid #d9cec7;
border-radius:8px;
background:#fff;
color:var(--ink);
font-size:15px;
outline:none;
}

select:focus,input:focus{
border-color:var(--brand);
box-shadow:0 0 0 3px rgba(181,22,34,0.12);
}

.entry-grid{
display:grid;
grid-template-columns:1fr 140px;
gap:15px;
align-items:end;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:8px;
background:var(--brand);
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:transform 0.15s ease,background 0.15s ease,opacity 0.15s ease;
}

button:hover{
background:var(--brand-dark);
transform:translateY(-1px);
}

.remove-button{
width:auto;
margin:0;
padding:8px 10px;
border-radius:8px;
background:#f2e9e2;
color:#5d504b;
font-size:13px;
}

.remove-button:hover{
background:#eadbd1;
color:#2a201d;
}

.cart{
margin-top:20px;
}

.cart-list{
display:grid;
gap:10px;
}

.cart-item{
display:grid;
grid-template-columns:1fr auto;
gap:12px;
align-items:center;
padding:14px;
border:1px solid var(--line);
border-radius:8px;
background:#fffdfb;
}

.item-main{
min-width:0;
}

.item-name{
font-weight:bold;
line-height:1.35;
}

.item-meta{
margin-top:4px;
color:var(--muted);
font-size:13px;
}

.item-actions{
display:flex;
align-items:center;
gap:12px;
}

.item-total{
min-width:112px;
text-align:right;
font-weight:bold;
color:var(--green);
}

.empty-cart{
padding:22px;
border:1px dashed #d8c9bf;
border-radius:8px;
background:#fffdfb;
color:var(--muted);
text-align:center;
}

.result{
display:grid;
gap:10px;
}

.row{
display:flex;
justify-content:space-between;
gap:15px;
padding:9px 0;
border-bottom:1px solid #f0e7e1;
font-size:14px;
}

.row:last-of-type{
border-bottom:none;
}

.row span:last-child{
font-weight:bold;
text-align:right;
}

.netbill{
background:linear-gradient(135deg,#fff4bc,#ffd96f);
border:1px solid #ecc65b;
padding:18px;
border-radius:8px;
font-size:28px;
font-weight:bold;
text-align:center;
margin-top:12px;
box-shadow:inset 0 1px 0 rgba(255,255,255,0.65);
}

.netbill small{
display:block;
font-size:12px;
color:#6a4c0b;
margin-bottom:6px;
text-transform:uppercase;
letter-spacing:0;
}

.placeholder{
padding:20px;
border-radius:8px;
background:#fffdfb;
color:var(--muted);
line-height:1.5;
text-align:center;
}

hr{
border:none;
border-top:1px solid var(--line);
margin:8px 0;
}

@media(max-width:850px){
body{
padding:14px;
}

.side-logo{
display:none;
}

.mobile-logo-strip{
display:grid;
}

.workspace{
grid-template-columns:1fr;
}

.summary-panel{
position:static;
}
}

@media(max-width:600px){
.hero{
padding:24px 20px;
}

h1{
font-size:28px;
}

.entry-grid,.cart-item{
grid-template-columns:1fr;
}

.item-actions{
justify-content:space-between;
}

.item-total{
text-align:left;
}
}

</style>
</head>

<body>

<div class="side-logo left" aria-hidden="true">
<img src="file:///D:/Abinbev/corona_logo.png" alt="">
</div>

<div class="side-logo right" aria-hidden="true">
<img src="file:///D:/Abinbev/Bud%20new%20logo-01.png" alt="">
</div>

<div class="container">

<div class="mobile-logo-strip" aria-label="Brand logos">
<img src="file:///D:/Abinbev/corona_logo.png" alt="Corona logo">
<img src="file:///D:/Abinbev/Bud%20new%20logo-01.png" alt="Budweiser logo">
</div>

<section class="hero">
<span class="eyebrow">Delhi excise order tool</span>
<h1>Delhi Beer Order Calculator</h1>
<p>Build a mixed SKU order, review the running cart, and see the net bill amount update with outlet-specific duties, VAT, and TCS.</p>
</section>

<main class="workspace">

<section class="order-panel">

<div class="section-title">
<h2>Order Details</h2>
<span class="badge" id="cartCount">0</span>
</div>

<label>Outlet Type</label>

<select id="outletType" onchange="renderCart()">
<option value="hotel">Hotel</option>
<option value="restaurant">Restaurant</option>
<option value="club">Club</option>
</select>

<div class="entry-grid">
<div>
<label>Product</label>

<select id="product">

<option value="bud330">Budweiser 330ml</option>
<option value="bud500">Budweiser 500ml</option>
<option value="bud650">Budweiser 650ml</option>

<option value="mag330">Budweiser Magnum 330ml</option>
<option value="mag500">Budweiser Magnum 500ml</option>
<option value="mag650">Budweiser Magnum 650ml</option>

<option value="cor330">Corona 330ml</option>
<option value="cor500">Corona 500ml</option>

<option value="hoe330">Hoegaarden 330ml</option>
<option value="hoe500">Hoegaarden 500ml</option>

<option value="budkeg">Budweiser Draught 30L</option>
<option value="hoekeg">Hoegaarden Draught 30L</option>

</select>
</div>

<div>
<label>Quantity</label>
<input
type="number"
id="qty"
value="1"
min="1"
step="1">
</div>
</div>

<button onclick="addItem()">
Add SKU to Order
</button>

<div class="cart" id="cart">
<div class="empty-cart">No SKUs added yet.</div>
</div>

</section>

<aside class="summary-panel">
<div class="section-title">
<h2>Bill Summary</h2>
<span class="badge">₹</span>
</div>

<div class="result" id="result">
<div class="placeholder">Add one or more SKUs to calculate the order.</div>
</div>
</aside>

</main>

</div>

<script>

const products = {

bud650:{
name:"Budweiser 650ml",
wsp:623.04,
excise:982.20,
rest:124.61,
club:124.61,
hotel:186.91
},

bud500:{
name:"Budweiser 500ml",
wsp:952.80,
excise:1524.72,
rest:190.56,
club:190.56,
hotel:285.84
},

bud330:{
name:"Budweiser 330ml",
wsp:648.48,
excise:1001.76,
rest:129.70,
club:129.70,
hotel:194.54
},

mag650:{
name:"Budweiser Magnum 650ml",
wsp:678.84,
excise:1063.68,
rest:135.77,
club:135.77,
hotel:203.65
},

mag500:{
name:"Budweiser Magnum 500ml",
wsp:989.76,
excise:1579.44,
rest:197.95,
club:197.95,
hotel:296.93
},

mag330:{
name:"Budweiser Magnum 330ml",
wsp:704.16,
excise:1131.12,
rest:140.83,
club:140.83,
hotel:211.25
},

cor330:{
name:"Corona 330ml",
wsp:1172.88,
excise:1854.24,
rest:234.58,
club:234.58,
hotel:351.86
},

cor500:{
name:"Corona 500ml",
wsp:1429.92,
excise:2238.48,
rest:285.98,
club:285.98,
hotel:428.98
},

hoe330:{
name:"Hoegaarden 330ml",
wsp:1172.88,
excise:1854.24,
rest:234.58,
club:234.58,
hotel:351.86
},

hoe500:{
name:"Hoegaarden 500ml",
wsp:1429.92,
excise:2238.48,
rest:285.98,
club:285.98,
hotel:428.98
},

budkeg:{
name:"Budweiser Draught 30L",
wsp:1952.22,
excise:2931.78,
rest:390.44,
club:390.44,
hotel:585.67
},

hoekeg:{
name:"Hoegaarden Draught 30L",
wsp:3866.63,
excise:5801.37,
rest:773.33,
club:773.33,
hotel:1159.99
}

};

const cart = [];
const rupeeFormatter = new Intl.NumberFormat("en-IN", {
style:"currency",
currency:"INR",
maximumFractionDigits:2
});

function money(value){
return rupeeFormatter.format(value);
}

function getAdditionalRate(sku,outlet){
if(outlet === "hotel"){
return sku.hotel;
}

if(outlet === "restaurant"){
return sku.rest;
}

return sku.club;
}

function calculateLine(item,outlet){
const sku = products[item.productId];
const wsp = sku.wsp * item.qty;
const excise = sku.excise * item.qty;
const additional = getAdditionalRate(sku,outlet) * item.qty;

return {
wsp,
excise,
additional,
taxable:wsp + excise + additional
};
}

function calculateOrder(){
const outlet = document.getElementById("outletType").value;
const totals = {
wsp:0,
excise:0,
additional:0,
vat:0,
total:0,
tcs:0,
grandTotal:0,
netBillAmount:0
};

cart.forEach(item => {
const line = calculateLine(item,outlet);
totals.wsp += line.wsp;
totals.excise += line.excise;
totals.additional += line.additional;
});

totals.vat = (totals.wsp + totals.excise + totals.additional) * 0.25;
totals.total = totals.wsp + totals.excise + totals.additional + totals.vat;

if(outlet !== "club"){
totals.tcs = (totals.total - totals.additional) * 0.02;
}

totals.grandTotal = totals.total + totals.tcs;
totals.netBillAmount = totals.grandTotal - totals.additional;

return totals;
}

function addItem(){
const productId = document.getElementById("product").value;
const qty = Number(document.getElementById("qty").value);

if(!Number.isInteger(qty) || qty < 1){
alert("Please enter a whole quantity of 1 or more.");
return;
}

const existingItem = cart.find(item => item.productId === productId);

if(existingItem){
existingItem.qty += qty;
}
else{
cart.push({
productId,
qty
});
}

document.getElementById("qty").value = 1;
renderCart();
}

function removeItem(index){
cart.splice(index,1);
renderCart();
}

function renderCart(){
const cartEl = document.getElementById("cart");
const resultEl = document.getElementById("result");
const countEl = document.getElementById("cartCount");
const outlet = document.getElementById("outletType").value;
const itemCount = cart.reduce((total,item) => total + item.qty,0);

countEl.textContent = itemCount;

if(cart.length === 0){
cartEl.innerHTML = `
<div class="empty-cart">No SKUs added yet.</div>
`;

resultEl.innerHTML = `<div class="placeholder">Add one or more SKUs to calculate the order.</div>`;
return;
}

const cartItems = cart.map((item,index) => {
const sku = products[item.productId];
const line = calculateLine(item,outlet);
const lineVat = line.taxable * 0.25;
const lineTotal = line.taxable + lineVat;

return `
<div class="cart-item">
<div class="item-main">
<div class="item-name">${sku.name} × ${item.qty}</div>
<div class="item-meta">Line value before TCS: ${money(lineTotal)}</div>
</div>
<div class="item-actions">
<div class="item-total">${money(lineTotal)}</div>
<button class="remove-button" onclick="removeItem(${index})">Remove</button>
</div>
</div>
`;
}).join("");

cartEl.innerHTML = `
<div class="cart-list">
${cartItems}
</div>
`;

renderTotals();
}

function renderTotals(){
const totals = calculateOrder();

document.getElementById("result").innerHTML = `

<div class="row">
<span>WSP</span>
<span>${money(totals.wsp)}</span>
</div>

<div class="row">
<span>Excise Duty</span>
<span>${money(totals.excise)}</span>
</div>

<div class="row">
<span>Additional Excise</span>
<span>${money(totals.additional)}</span>
</div>

<hr>

<div class="row">
<span>VAT (25%)</span>
<span>${money(totals.vat)}</span>
</div>

<div class="row">
<span>Total Order Value</span>
<span>${money(totals.total)}</span>
</div>

<div class="row">
<span>TCS</span>
<span>${money(totals.tcs)}</span>
</div>

<div class="row">
<span>Grand Total</span>
<span>${money(totals.grandTotal)}</span>
</div>

<div class="netbill">
<small>Net Bill Amount</small>
${money(totals.netBillAmount)}
</div>

`;
}

</script>

</body>
</html>
