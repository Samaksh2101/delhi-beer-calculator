<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delhi Beer Order Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#c8102e;
}

label{
    font-weight:bold;
    display:block;
    margin-top:15px;
}

select,input{
    width:100%;
    padding:12px;
    margin-top:6px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#c8102e;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.result{
    margin-top:25px;
    background:#fafafa;
    border:1px solid #ddd;
    border-radius:10px;
    padding:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.netbill{
    background:#fff176;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
}

hr{
    margin:15px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>Delhi Beer Order Calculator</h1>

<label>Outlet Type</label>
<select id="outletType">
    <option value="hotel">Hotel</option>
    <option value="restaurant">Restaurant</option>
    <option value="club">Club</option>
</select>

<label>Product</label>
<select id="product">

<option value="bud330">Budweiser 330ml</option>
<option value="bud500">Budweiser 500ml</option>
<option value="bud650">Budweiser 650ml</option>

<option value="mag330">Budweiser Magnum 330ml</option>
<option value="mag500">Budweiser Magnum 500ml</option>
<option value="mag650">Budweiser Magnum 650ml</option>

<option value="cor330">Corona 330ml</option>
<option value="cor500">Corona 500ml</option>

<option value="hoe330">Hoegaarden 330ml</option>
<option value="hoe500">Hoegaarden 500ml</option>

<option value="budkeg">Budweiser Draught 30L</option>
<option value="hoekeg">Hoegaarden Draught 30L</option>

</select>

<label>Quantity (Cases)</label>
<input type="number" id="qty" value="1" min="1">

<button onclick="calculate()">
Calculate Net Bill
</button>

<div class="result" id="result">
Enter quantity and click Calculate
</div>

</div>

<script>

const products = {

bud650:{
wsp:623.04,
excise:982.20,
rest:124.61,
club:124.61,
hotel:186.91
},

bud500:{
wsp:952.80,
excise:1524.72,
rest:190.56,
club:190.56,
hotel:285.84
},

bud330:{
wsp:648.48,
excise:1001.76,
rest:129.70,
club:129.70,
hotel:194.54
},

mag650:{
wsp:678.84,
excise:1063.68,
rest:135.77,
club:135.77,
hotel:203.65
},

mag500:{
wsp:989.76,
excise:1579.44,
rest:197.95,
club:197.95,
hotel:296.93
},

mag330:{
wsp:704.16,
excise:1131.12,
rest:140.83,
club:140.83,
hotel:211.25
},

cor330:{
wsp:1172.88,
excise:1854.24,
rest:234.58,
club:234.58,
hotel:351.86
},

cor500:{
wsp:1429.92,
excise:2238.48,
rest:285.98,
club:285.98,
hotel:428.98
},

hoe330:{
wsp:1172.88,
excise:1854.24,
rest:234.58,
club:234.58,
hotel:351.86
},

hoe500:{
wsp:1429.92,
excise:2238.48,
rest:285.98,
club:285.98,
hotel:428.98
},

budkeg:{
wsp:1952.22,
excise:2931.78,
rest:390.44,
club:390.44,
hotel:585.67
},

hoekeg:{
wsp:3866.63,
excise:5801.37,
rest:773.33,
club:773.33,
hotel:1159.99
}

};

function calculate(){

const sku = products[document.getElementById("product").value];
const qty = Number(document.getElementById("qty").value);
const outlet = document.getElementById("outletType").value;

let addExcise = 0;

if(outlet === "hotel"){
    addExcise = sku.hotel;
}
else if(outlet === "restaurant"){
    addExcise = sku.rest;
}
else{
    addExcise = sku.club;
}

const wsp = sku.wsp * qty;
const excise = sku.excise * qty;
const additional = addExcise * qty;

const vat = (wsp + excise + additional) * 0.25;

const total = wsp + excise + additional + vat;

let tcs = 0;

if(outlet !== "club"){
    tcs = (total - additional) * 0.02;
}

const netBillAmount = total - tcs;

document.getElementById("result").innerHTML = `

<div class="row">
<span>WSP</span>
<span>₹ ${wsp.toFixed(2)}</span>
</div>

<div class="row">
<span>Excise Duty</span>
<span>₹ ${excise.toFixed(2)}</span>
</div>

<div class="row">
<span>Additional Excise</span>
<span>₹ ${additional.toFixed(2)}</span>
</div>

<hr>

<div class="row">
<span>VAT (25%)</span>
<span>₹ ${vat.toFixed(2)}</span>
</div>

<div class="row">
<span>Total</span>
<span>₹ ${total.toFixed(2)}</span>
</div>

<div class="row">
<span>TCS</span>
<span>₹ ${tcs.toFixed(2)}</span>
</div>

<div class="netbill">
NET BILL AMOUNT<br>
₹ ${netBillAmount.toFixed(2)}
</div>

`;

}

</script>

</body>
</html>
