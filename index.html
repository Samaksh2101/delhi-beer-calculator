function calculate(){

const sku = products[document.getElementById("product").value];
const qty = Number(document.getElementById("qty").value);
const outlet = document.getElementById("outletType").value;

let additionalRate = 0;

if(outlet === "hotel"){
additionalRate = sku.hotel;
}
else if(outlet === "restaurant"){
additionalRate = sku.rest;
}
else{
additionalRate = sku.club;
}

const wsp = sku.wsp * qty;
const excise = sku.excise * qty;
const additional = additionalRate * qty;

const vat = (wsp + excise + additional) * 0.25;

const total =
wsp +
excise +
additional +
vat;

let tcs = 0;

if(outlet !== "club"){
tcs = (total - additional) * 0.02;
}

const grandTotal = total + tcs;

const netBillAmount =
grandTotal - additional;

document.getElementById("result").innerHTML = `

<div class="row">
<span>WSP</span>
<span>₹ ${wsp.toFixed(2)}</span>
</div>
